<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: black;\n            color: white;\n            font-family: Arial, sans-serif;\n        }\n        canvas {\n            border: 1px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="gameCanvas" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        const paddleWidth = 10;\n        const paddleHeight = 100;\n        const ballRadius = 10;\n        let playerY = (canvas.height - paddleHeight) / 2;\n        let aiY = (canvas.height - paddleHeight) / 2;\n        let ballX = canvas.width / 2;\n        let ballY = canvas.height / 2;\n        let ballSpeedX = 5;\n        let ballSpeedY = 2;\n        let playerScore = 0;\n        let aiScore = 0;\n\n        function draw() {\n            // Background\n            ctx.fillStyle = 'black';\n            ctx.fillRect(0, 0, canvas.width, canvas.height);\n\n            // Player Paddle\n            ctx.fillStyle = 'white';\n            ctx.fillRect(0, playerY, paddleWidth, paddleHeight);\n\n            // AI Paddle\n            ctx.fillRect(canvas.width - paddleWidth, aiY, paddleWidth, paddleHeight);\n\n            // Ball\n            ctx.beginPath();\n            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);\n            ctx.fill();\n        }\n\n        function update() {\n            // Move the ball\n            ballX += ballSpeedX;\n            ballY += ballSpeedY;\n\n            // Ball collision with top and bottom\n            if (ballY < ballRadius || ballY > canvas.height - ballRadius) {\n                ballSpeedY = -ballSpeedY;\n            }\n\n            // Ball collision with paddles\n            if (ballX < paddleWidth && ballY > playerY && ballY < playerY + paddleHeight) {\n                ballSpeedX = -ballSpeedX;\n            }\n            if (ballX > canvas.width - paddleWidth - ballRadius && ballY > aiY && ballY < aiY + paddleHeight) {\n                ballSpeedX = -ballSpeedX;\n            }\n\n            // Scoring\n            if (ballX < 0) {\n                aiScore++;\n                resetBall();\n            } else if (ballX > canvas.width) {\n                playerScore++;\n                resetBall();\n            }\n\n            // Move AI paddle\n            aiY += (ballY - (aiY + paddleHeight / 2)) * 0.1;\n            aiY = Math.max(Math.min(aiY, canvas.height - paddleHeight), 0);\n        }\n\n        function resetBall() {\n            ballX = canvas.width / 2;\n            ballY = canvas.height / 2;\n            ballSpeedX = -ballSpeedX;\n        }\n\n        function drawScore() {\n            ctx.fillStyle = 'white';\n            ctx.font = '24px Arial';\n            ctx.fillText(`Player: ${playerScore}`, 20, 30);\n            ctx.fillText(`AI: ${aiScore}`, canvas.width - 100, 30);\n        }\n\n        function gameLoop() {\n            draw();\n            update();\n            drawScore();\n            requestAnimationFrame(gameLoop);\n        }\n\n        document.addEventListener('mousemove', (e) => {\n            const rect = canvas.getBoundingClientRect();\n            const mouseY = e.clientY - rect.top;\n            playerY = mouseY - paddleHeight / 2;\n            playerY = Math.max(Math.min(playerY, canvas.height - paddleHeight), 0);\n        });\n\n        document.addEventListener('keydown', (e) => {\n            if (e.key === 'ArrowUp') {\n                playerY -= 10;\n            } else if (e.key === 'ArrowDown') {\n                playerY += 10;\n            }\n            playerY = Math.max(Math.min(playerY, canvas.height - paddleHeight), 0);\n        });\n\n        gameLoop();\n    </script>\n</body>\n</html>
